<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة العمر - أبو القاسم</title>
    <style>
        /* تصميم الـ 3D والخلفية المتحركة */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }
        @keyframes gradientBG {
            0% {background-position: 0% 50%}
            50% {background-position: 100% 50%}
            100% {background-position: 0% 50%}
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,255,255,0.1);
            text-align: center;
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
        }
        h2 { margin-bottom: 20px; text-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { 
            width: 33%; padding: 15px; border-radius: 20px; border: none; 
            text-align: center; font-size: 16px; background: rgba(255,255,255,0.9);
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.2);
        }
        button { 
            background: #ff7e5f; color: white; border: none; padding: 15px; width: 100%; 
            border-radius: 20px; font-weight: bold; font-size: 18px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.3s;
        }
        button:hover { transform: scale(1.05); background: #feb47b; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .box { 
            background: rgba(0,0,0,0.2); padding: 15px; border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1);
        }
        .box b { font-size: 1.4em; display: block; color: #fff; }
        .footer { margin-top: 25px; font-size: 0.9em; color: rgba(255,255,255,0.6); }
    </style>
</head>
<body>
    <div class="card">
        <h2>حاسبة العمر الدقيقة</h2>
        <div class="input-group">
            <input type="number" id="day" placeholder="اليوم">
            <input type="number" id="month" placeholder="الشهر">
            <input type="number" id="year" placeholder="السنة">
        </div>
        <button onclick="calculate()">احسب عمري</button>
        <div id="res" class="result-grid"></div>
        <div class="footer">برمجة وتطوير: <b>أبو القاسم</b></div>
    </div>
    <script>
        function calculate() {
            const d = parseInt(document.getElementById('day').value);
            const m = parseInt(document.getElementById('month').value) - 1;
            const y = parseInt(document.getElementById('year').value);
            if(!d || !m || !y) return alert("الرجاء إدخال التاريخ كاملاً");
            
            const birth = new Date(y, m, d);
            const now = new Date();
            let years = now.getFullYear() - birth.getFullYear();
            let months = now.getMonth() - birth.getMonth();
            let days = now.getDate() - birth.getDate();
            if (days < 0) { months--; days += 30; }
            if (months < 0) { years--; months += 12; }
            
            const diff = now - birth;
            const seconds = Math.floor((diff / 1000) % 60);
            
            document.getElementById('res').innerHTML = `
                <div class="box"><b>${years}</b>سنة</div>
                <div class="box"><b>${months}</b>شهر</div>
                <div class="box"><b>${days}</b>يوم</div>
                <div class="box"><b>${seconds}</b>ثانية</div>
            `;
        }
    </script>
</body>
</html>
