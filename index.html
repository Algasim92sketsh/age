 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حاسبة العمر الدقيق</title>

    <!-- ميزات دعم التشغيل كتطبيق هاتف -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    
    <!-- كود أيقونة التطبيق الخاص بصورتك يا أبوالقاسم -->
    <link rel="icon" type="image/jpeg" href="IMG-20260320-WA0143 (2).jpg">
    <link rel="apple-touch-icon" href="IMG-20260320-WA0143 (2).jpg">

    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #a855f7;
            --bg-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --card-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: #333;
            padding: 15px;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 30px 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--card-shadow);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        h1 {
            color: #1e1b4b;
            font-size: 1.8rem;
            margin-bottom: 25px;
            font-weight: 800;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #4f46e5;
            font-weight: 600;
            font-size: 0.95rem;
        }

        input[type="date"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
            background: white;
        }

        input[type="date"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        button {
            width: 100%;
            background: var(--bg-gradient);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            transition: all 0.2s ease;
        }

        button:active {
            transform: scale(0.98);
        }

        .results-box {
            margin-top: 25px;
            display: none;
        }

        .main-result {
            background: rgba(99, 102, 241, 0.08);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 15px;
            border: 1px solid rgba(99, 102, 241, 0.15);
        }

        .main-result .number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #4f46e5;
            display: block;
            line-height: 1.2;
        }

        .main-result .label {
            font-size: 1rem;
            color: #6b7280;
            font-weight: 600;
        }

        .grid-results {
            display: grid;
            grid-template-columns: repeat(2, 10fr);
            gap: 12px;
        }

        .grid-item {
            background: #f8fafc;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .grid-item .num {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1e293b;
            display: block;
        }

        .grid-item .lbl {
            font-size: 0.85rem;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>حاسبة العمر الدقيق</h1>
    
    <div class="input-group">
        <label for="birthdate">اختر تاريخ ميلادك:</label>
        <input type="date" id="birthdate">
    </div>
    
    <button onclick="calculateAge()">احسب عمري الآن</button>
    
    <div class="results-box" id="resultsBox">
        <div class="main-result">
            <span class="number" id="resYears">0</span>
            <span class="label">سنة كاملة</span>
        </div>
        
        <div class="grid-results">
            <div class="grid-item">
                <span class="num" id="resMonths">0</span>
                <span class="lbl">أشهر</span>
            </div>
            <div class="grid-item">
                <span class="num" id="resWeeks">0</span>
                <span class="lbl">أسابيع</span>
            </div>
            <div class="grid-item">
                <span class="num" id="resDays">0</span>
                <span class="lbl">أيام</span>
            </div>
            <div class="grid-item">
                <span class="num" id="resHours">0</span>
                <span class="lbl">ساعات</span>
            </div>
        </div>
    </div>
</div>

<script>
    // تحديد تاريخ اليوم كحد أقصى في الإدخال
    document.getElementById('birthdate').max = new Date().toISOString().split("T")[0];

    function calculateAge() {
        const birthDateInput = document.getElementById('birthdate').value;
        if (!birthDateInput) {
            alert('الرجاء اختيار تاريخ ميلادك أولاً!');
            return;
        }

        const birthDate = new Date(birthDateInput);
        const nowDate = new Date();

        if (birthDate > nowDate) {
            alert('تاريخ الميلاد لا يمكن أن يكون في المستقبل!');
            return;
        }

        const diffTime = nowDate - birthDate;
        
        // الحسابات الدقيقة
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
        const diffWeeks = Math.floor(diffDays / 7);
        const diffHours = Math.floor(diffTime / (1000 * 60 * 60));
        
        // حساب السنين والأشهر بدقة تقويمية
        let years = nowDate.getFullYear() - birthDate.getFullYear();
        let months = nowDate.getMonth() - birthDate.getMonth();
        
        if (months < 0 || (months === 0 && nowDate.getDate() < birthDate.getDate())) {
            years--;
            months = 12 + months;
        }
        if (nowDate.getDate() < birthDate.getDate()) {
            months--;
        }
        if (months < 0) {
            months = 11;
        }

        // إجمالي الأشهر التقريبية الكلية
        const totalMonths = (years * 12) + months;

        // عرض النتائج وتحريك الواجهة
        document.getElementById('resultsBox').style.display = 'block';
        
        animateValue('resYears', years);
        animateValue('resMonths', totalMonths);
        animateValue('resWeeks', diffWeeks);
        animateValue('resDays', diffDays);
        animateValue('resHours', diffHours);
    }

    function animateValue(id, endValue) {
        const obj = document.getElementById(id);
        let startValue = 0;
        const duration = 800;
        const startTime = performance.now();
        
        function step(currentTime) {
            const elapsedTime = currentTime - startTime;
            const progress = Math.min(elapsedTime / duration, 1);
            // تأثير خروج سلس (Ease out)
            const easeProgress = 1 - Math.pow(1 - progress, 3);
            
            const currentValue = Math.floor(easeProgress * endValue);
            obj.textContent = currentValue.toLocaleString('ar-SA');
            
            if (progress < 1) {
                window.requestAnimationFrame(step);
            } else {
                obj.textContent = endValue.toLocaleString('ar-SA');
            }
        }
        window.requestAnimationFrame(step);
    }
</script>

</body>
</html>
