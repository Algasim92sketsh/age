<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة العمر - أبوالقاسم معتصم الخير</title>
    <link href="https://fonts.googleapis.com/css2?family=Lateef:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            /* خلفية حية متحركة تتناغم مع اللون الذهبي */
            background: linear-gradient(-45deg, #0f2027, #2c5364, #3a1c71, #d76d77);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            font-family: 'Lateef', serif;
        }
        @keyframes gradientBG {
            0% {background-position: 0% 50%}
            50% {background-position: 100% 50%}
            100% {background-position: 0% 50%}
        }
        .glass-card {
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,215,0,0.3); width: 90%; max-width: 500px; 
            text-align: center; color: white;
        }
        .dev-name { 
            font-size: 3em; margin-bottom: 20px; font-weight: 700;
            color: #FFD700;
            text-shadow: 2px 2px 0px #8B4513, 0 0 10px rgba(255,215,0,0.4);
            border-bottom: 2px solid #FFD700;
            padding-bottom: 5px;
        }
        h3 { font-size: 2.2em; color: #fff; margin: 10px 0; }
        input { width: 25%; padding: 15px; border-radius: 15px; border: 1px solid #FFD700; text-align: center; margin: 5px; font-size: 22px; background: rgba(255,255,255,0.1); color: white; font-family: 'Lateef', serif; }
        button { width: 85%; padding: 15px; border-radius: 15px; border: none; background: #FFD700; color: #000; font-size: 28px; font-weight: bold; margin-top: 20px; cursor: pointer; transition: 0.4s; font-family: 'Lateef', serif; }
        button:hover { transform: scale(1.05); background: #fff; }
        
        /* تعديل شبكة النتائج لتستوعب الساعات */
        .result-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 30px; }
        .data-box { background: rgba(255, 215, 0, 0.15); padding: 10px; border-radius: 15px; border: 1px solid #FFD700; }
        b { font-size: 1.8em; color: #FFD700; display: block; }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="dev-name">أبوالقاسم معتصم الخير</div>
        <h3>حاسبة العمر الدقيقة</h3>
        <input type="number" id="day" placeholder="اليوم">
        <input type="number" id="month" placeholder="الشهر">
        <input type="number" id="year" placeholder="السنة">
        <button onclick="calc()">احسب الآن</button>
        <div class="result-container" id="res"></div>
    </div>
    <script>
        function calc() {
            const d = parseInt(document.getElementById('day').value);
            const m = parseInt(document.getElementById('month').value) - 1;
            const y = parseInt(document.getElementById('year').value);
            if(!d || !m || !y) return alert("الرجاء إدخال التاريخ كاملاً");
            
            const birth = new Date(y, m, d);
            const now = new Date();
            
            // حساب الفروقات
            let years = now.getFullYear() - birth.getFullYear();
            let months = now.getMonth() - birth.getMonth();
            let days = now.getDate() - birth.getDate();
            
            if(days < 0){ months--; days += 30; }
            if(months < 0){ years--; months += 12; }
            
            // حساب الساعات (الفرق بالملي ثانية مقسوم على عدد الملي ثانية في الساعة)
            const diffInMs = now - birth;
            const hours = Math.floor(diffInMs / (1000 * 60 * 60));
            const minutes = Math.floor((diffInMs / (1000 * 60)) % 60);
            const seconds = Math.floor((diffInMs / 1000) % 60);
            
            document.getElementById('res').innerHTML = `
                <div class="data-box"><b>${years}</b>سنة</div>
                <div class="data-box"><b>${months}</b>شهر</div>
                <div class="data-box"><b>${days}</b>يوم</div>
                <div class="data-box"><b>${hours}</b>ساعة</div>
                <div class="data-box"><b>${minutes}</b>دقيقة</div>
                <div class="data-box"><b>${seconds}</b>ثانية</div>
            `;
        }
    </script>
</body>
</html>
