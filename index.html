<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة العمر - أبوالقاسم</title>
    <link href="https://fonts.googleapis.com/css2?family=Lateef:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #2c3e50; /* لون هادئ ثابت */
            font-family: 'Lateef', serif;
            display: flex; justify-content: center; align-items: center;
        }
        .container {
            background: #34495e; /* لون الكارت الهادئ */
            padding: 20px; border-radius: 20px;
            width: 90%; max-width: 350px; text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border: 2px solid #c5a059;
        }
        .name { color: #c5a059; font-size: 2em; margin-bottom: 10px; }
        .title { color: #ecf0f1; margin-bottom: 15px; }
        input { 
            width: 80%; padding: 10px; margin: 5px; border-radius: 8px; 
            border: 1px solid #c5a059; background: #2c3e50; color: white; text-align: center;
        }
        button { 
            width: 85%; padding: 12px; margin-top: 10px; border-radius: 8px; 
            border: none; background: #c5a059; color: white; font-size: 18px; cursor: pointer;
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 15px; }
        .box { background: #2c3e50; border: 1px solid #c5a059; padding: 5px; border-radius: 8px; color: #ecf0f1; }
        .val { color: #c5a059; font-size: 1.5em; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="name">أبوالقاسم معتصم الخير</div>
        <div class="title">حاسبة العمر الدقيقة</div>
        <input type="number" id="day" placeholder="اليوم">
        <input type="number" id="month" placeholder="الشهر">
        <input type="number" id="year" placeholder="السنة">
        <button onclick="calc()">احسب الآن</button>
        <div class="grid" id="res"></div>
    </div>
    <script>
        function calc() {
            const d = parseInt(document.getElementById('day').value);
            const m = parseInt(document.getElementById('month').value) - 1;
            const y = parseInt(document.getElementById('year').value);
            if(!d || !m || !y) return alert("الرجاء إدخال التاريخ كاملاً");
            const birth = new Date(y, m, d);
            const now = new Date();
            let years = now.getFullYear() - birth.getFullYear();
            let months = now.getMonth() - birth.getMonth();
            let days = now.getDate() - birth.getDate();
            if(days < 0){ months--; days += 30; }
            if(months < 0){ years--; months += 12; }
            document.getElementById('res').innerHTML = `
                <div class="box"><b class="val">${years}</b>سنة</div>
                <div class="box"><b class="val">${months}</b>شهر</div>
                <div class="box"><b class="val">${days}</b>يوم</div>
                <div class="box"><b class="val">${now.getHours()}</b>ساعة</div>
                <div class="box"><b class="val">${now.getMinutes()}</b>دقيقة</div>
                <div class="box"><b class="val">${now.getSeconds()}</b>ثانية</div>
            `;
        }
    </script>
</body>
</html>
